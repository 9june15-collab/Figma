name: Sync Design Tokens

on:
  push:
    paths:
      - 'tokens.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Style Dictionary
        run: npm install -g style-dictionary

      - name: Convert tokens to CSS
        run: |
          cat > sd.config.json << 'EOF'
          {
            "source": ["tokens.json"],
            "platforms": {
              "css": {
                "transformGroup": "css",
                "prefix": "color",
                "buildPath": "./",
                "files": [{
                  "destination": "tokens.css",
                  "format": "css/variables"
                }]
              }
            }
          }
          EOF
          style-dictionary build --config sd.config.json

      - name: Commit updated tokens.css
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tokens.css
          git diff --staged --quiet || git commit -m "update tokens.css"
          git push
