<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* 100vw 대신 100%로 안전하게 설정 */
    body { width: 100%; height: 100vh; overflow: hidden; }

    .container {
      position: relative; 
      width: 100%;
      height: 100vh;
    }

    #iframe1 {
      position: absolute;  
      top: 0;
      left: 0;
      width: 100%;          /* 배경 — 전체 크기 */
      height: 100%;
      z-index: 1;
      border: none;
    }

    #iframe2 {
      position: absolute;   
      top: 0;
      left: 0;
      width: 50%;           /* 앞에 — 절반 크기 */
      height: 50%;
      z-index: 2;
      border: none;
      /* 뒤에 있는 iframe을 클릭해야 한다면 아래 주석을 해제하세요 */
      /* pointer-events: none; */ 
    }
  </style>
</head>
<body>
  <div class="container">
    <iframe id="iframe1"
      src="https://www.figma.com/design/ncepuhxq7se16Fmy5VoPT0/HOMEscreen?node-id=0-1&t=DnBMMj6mcDk7av19-1">
    </iframe>
    
    <iframe id="iframe2"
      src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/uhltaRpyH2Gs1u6jufu5gT/Prototype-test?node-id=0-1&hide-ui=1">
    </iframe>
  </div>
</body>
</html>
