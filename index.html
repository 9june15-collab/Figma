<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stack {
      position: relative;
      width: 80vw;
      height: 80vh;
    }
    .layer-2 {
      position: absolute;
      width: 80%;
      height: 80%;
      bottom: 0;
      right: 0;
      border-radius: 8px;
      background: #ff0000;
      z-index: 1;
    }
    .layer-1 {
      position: absolute;
      width: 80%;
      height: 80%;
      top: 0;
      left: 0;
      border: none;
      border-radius: 8px;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="stack">
    <div class="layer-2"></div>
    <iframe class="layer-1"
      src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/uhltaRpyH2Gs1u6jufu5gT/Prototype-test?node-id=0-1&hide-ui=1"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
