<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stack {
      position: relative;
      width: 80vw;
      height: 80vh;
    }
    .layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: none;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .layer-1 {
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    .layer-2 {
  width: 85%;
  height: 85%;
  z-index: 1;
  transform: translate(-44%, -44%);
  opacity: 0.85;
}
    }
  </style>
</head>
<body>
 <div class="stack">
    <iframe class="layer layer-2"
  src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/AadcVfiXThYoqp9RIZr1gz/Timeline-of-Figma?node-id=0-1&hide-ui=1"
  allowfullscreen>
<iframe class="layer layer-2"
  src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/uhltaRpyH2Gs1u6jufu5gT/Prototype-test?node-id=0-1&hide-ui=1"
  allowfullscreen>
</iframe>
  </div>
</body>
</html>
