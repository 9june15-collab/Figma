<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }

    .container {
      position: relative; 
      width: 100vw;
      height: 100vh;
    }

    #iframe1 {
      position: absolute;  
      top: 0;
      left: 0;
      width: 100%;          /* 배경 — 전체 크기 */
      height: 100%;
      z-index: 1;
      border: none;
    }

    #iframe2 {
      position: absolute;   
      top: 0;
      left: 0;
      width: 50%;           /* 앞에 — 절반 크기 */
      height: 300px;
      z-index: 2;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <iframe id="iframe1"
      src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/uhltaRpyH2Gs1u6jufu5gT/Prototype-test?node-id=0-1&hide-ui=1">
    </iframe>
    <iframe id="iframe2"
      src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/uhltaRpyH2Gs1u6jufu5gT/Prototype-test?node-id=0-1&hide-ui=1">
    </iframe>
  </div>
</body>
</html>
