<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }

    .iframe-container {
      position: relative;   /* stacking context 생성 */
      width: 100%;
      height: 100vh;
    }

    #iframe1 {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 300px;
      z-index: 1;           /* 뒤 레이어 */
      border: none;
    }

    #iframe2 {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 300px;
      z-index: 2;           /* 앞 레이어 */
      border: none;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe id="iframe1"
      src="https://www.figma.com/embed?embed_host=share&url=...">
    </iframe>
    <iframe id="iframe2"
      src="https://www.figma.com/embed?embed_host=share&url=...">
    </iframe>
  </div>
</body>
</html>
