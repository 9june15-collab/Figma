<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }

    #iframe1, #iframe2 {
  position: absolute;
  top: 0;
  left: 0;        /* ← 이 세 줄 추가 */
  width: 100%;
  height: 100%;   /* ← width/height를 % 단위로 변경 */
  border: none;
}

#iframe1 { z-index: 1; }
#iframe2 { z-index: 2; }

    .iframe-container {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    #iframe1, #iframe2 {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #iframe1 { z-index: 1; }
    #iframe2 { z-index: 2; }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe id="iframe1"
      src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/uhltaRpyH2Gs1u6jufu5gT/Prototype-test?node-id=0-1&hide-ui=1">
    </iframe>
    <iframe id="iframe2"
      src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/uhltaRpyH2Gs1u6jufu5gT/Prototype-test?node-id=0-1&hide-ui=1">
    </iframe>
  </div>
</body>
</html>
